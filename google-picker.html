<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Google Drive Picker - Quick Search File</title>
  <style>
    html,
    body {
      background: #fff;
      color: #1f1f1f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100%;
      margin: 0;
    }

    .status {
      align-items: center;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }

    .status strong {
      font-size: 22px;
      font-weight: 700;
    }

    .status span {
      color: #6f7278;
      font-size: 16px;
      line-height: 1.45;
      max-width: 360px;
    }
  </style>
</head>
<body>
  <main class="status" id="status">
    <strong>Opening Google Drive...</strong>
    <span>Please choose the folder you want Quick Search File to index.</span>
  </main>

  <script>
    const query = new URLSearchParams(window.location.search);
    const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
    const developerKey = query.get("developerKey") || "";
    const appId = query.get("appId") || "";
    const callbackScheme = query.get("callbackScheme") || "";
    const state = query.get("state") || "";
    const accessToken = hash.get("access_token") || "";
    let pickerVisible = false;

    function updateStatus(title, message) {
      document.getElementById("status").innerHTML =
        `<strong>${escapeHTML(title)}</strong><span>${escapeHTML(message)}</span>`;
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function base64URL(value) {
      const bytes = new TextEncoder().encode(JSON.stringify(value));
      let binary = "";
      bytes.forEach((byte) => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary)
        .replaceAll("+", "-")
        .replaceAll("/", "_")
        .replace(/=+$/, "");
    }

    function finish(params) {
      const callbackParams = new URLSearchParams({ state, ...params });
      window.location.href = `${callbackScheme}:/google-picker?${callbackParams.toString()}`;
    }

    function fail(message) {
      finish({ error: message || "Unable to open Google Picker." });
    }

    function validateInputs() {
      if (!developerKey || !appId || !callbackScheme || !state || !accessToken) {
        fail("Google Picker is missing required configuration.");
        return false;
      }
      return true;
    }

    function onPickerAPIReady() {
      if (!validateInputs()) {
        return;
      }

      const view = new google.picker.DocsView(google.picker.ViewId.FOLDERS)
        .setIncludeFolders(true)
        .setMimeTypes("application/vnd.google-apps.folder")
        .setSelectFolderEnabled(true)
        .setMode(google.picker.DocsViewMode.LIST);

      const picker = new google.picker.PickerBuilder()
        .addView(view)
        .setOAuthToken(accessToken)
        .setDeveloperKey(developerKey)
        .setAppId(appId)
        .setOrigin("https://quicksearchfile.com")
        .setSize(Math.max(320, window.innerWidth), Math.max(560, window.innerHeight))
        .setCallback(pickerCallback)
        .build();

      pickerVisible = true;
      picker.setVisible(true);
    }

    function pickerCallback(data) {
      if (data.action === google.picker.Action.CANCEL) {
        finish({ cancelled: "1" });
        return;
      }

      if (data.action !== google.picker.Action.PICKED) {
        return;
      }

      const folders = (data.docs || [])
        .filter((doc) => doc.id)
        .map((doc) => ({
          id: doc.id,
          name: doc.name || doc.title || "Google Drive Folder",
          url: doc.url || ""
        }));

      if (folders.length === 0) {
        fail("No Google Drive folder was selected.");
        return;
      }

      finish({ folders: base64URL(folders) });
    }

    window.addEventListener("pagehide", () => {
      if (!pickerVisible) {
        return;
      }
      pickerVisible = false;
    });
  </script>
  <script src="https://apis.google.com/js/api.js" onload="gapi.load('picker', { callback: onPickerAPIReady });" onerror="fail('Unable to load Google Picker.')"></script>
</body>
</html>
